name: Generate profile summary cards

# Generates a folder of SVG summary cards (profile details, repos per
# language, most-committed languages, stats, productive time).

on:
  schedule:
    - cron: "0 0 * * *"          # midnight UTC daily
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate profile summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: Sumityvd
